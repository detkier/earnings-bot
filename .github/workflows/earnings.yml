name: 財報推送

on:
  schedule:
    - cron: "0 1 * * *"      # 每天 09:00 台灣時間（推送昨日/今日已公布財報）
    - cron: "0 0 * * 0"      # 每週日 08:00 台灣時間（預覽下週財報行事曆）
  workflow_dispatch:
    inputs:
      mode:
        description: "執行模式 (earnings / calendar)"
        required: false
        default: "earnings"

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: 下載程式碼
        uses: actions/checkout@v4

      - name: 設定 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安裝套件
        run: pip install requests python-dotenv

      - name: 推送財報結果（每日）
        if: ${{ github.event.schedule != '0 0 * * 0' && github.event.inputs.mode != 'calendar' }}
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: python main_earnings.py

      - name: 推送週度行事曆（每週日）
        if: ${{ github.event.schedule == '0 0 * * 0' || github.event.inputs.mode == 'calendar' }}
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: python main_calendar.py
